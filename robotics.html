<!DOCTYPE html>
<html>
<head>
<title>RideFast</title>
<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#00c853;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.hero{
text-align:center;
padding:120px 20px;
background:#111;
color:white;
}

.btn{
padding:15px 30px;
background:#00c853;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.features{
display:flex;
justify-content:center;
gap:40px;
padding:60px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<h2>RideFast</h2>
<nav>
Home | Book | Drivers | Safety | Contact
</nav>
</header>

<section class="hero">
<h1>Motorcycle Rides in Minutes</h1>
<p>Fast, affordable and safe rides across the city</p>
<button class="btn">Book Ride</button>
</section>

<section class="features">
<div class="card">
<h3>Fast Pickup</h3>
<p>Drivers arrive in minutes.</p>
</div>

<div class="card">
<h3>Safe Rides</h3>
<p>Verified and trained drivers.</p>
</div>

<div class="card">
<h3>Affordable</h3>
<p>Low prices compared to taxis.</p>
</div>
</section>

</body>
</html>
