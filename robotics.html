<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Replica</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:black;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    position:absolute;
    width:100%;
}

.logo{
    color:red;
    font-size:32px;
    font-weight:bold;
}

.signin{
    background:red;
    border:none;
    color:white;
    padding:8px 16px;
    border-radius:4px;
    cursor:pointer;
}

.hero{
    height:90vh;
    background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero p{
    font-size:20px;
}

.hero button{
    background:red;
    border:none;
    padding:12px 25px;
    font-size:18px;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

.movies{
    padding:20px 50px;
}

.row{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

.movie{
    min-width:200px;
}

.movie img{
    width:100%;
    border-radius:5px;
    transition:0.3s;
}

.movie img:hover{
    transform:scale(1.1);
}

footer{
    text-align:center;
    padding:20px;
    color:gray;
}

</style>
</head>

<body>

<header>
<div class="logo">NETFLIX</div>
<button class="signin">Sign In</button>
</header>

<div class="hero">
<div>
<h1>Unlimited movies, TV shows, and more.</h1>
<p>Watch anywhere. Cancel anytime.</p>
<button>Get Started</button>
</div>
</div>

<section class="movies">

<h2>Trending Now</h2>
<div class="row">

<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>

</div>

<h2>Popular</h2>
<div class="row">

<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>
<div class="movie"><img src="https://via.placeholder.com/200x300"></div>

</div>

</section>

<footer>
<p>Netflix Replica UI - Demo</p>
</footer>

</body>
</html>
